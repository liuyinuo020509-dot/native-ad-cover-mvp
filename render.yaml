services:
  - type: web
    name: native-ad-cover-mvp
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: TEXT_MODEL
        value: gpt-5
      - key: IMAGE_MODEL
        value: gpt-image-2
      - key: IMAGE_SIZE
        value: auto
      - key: IMAGE_SIZE_16_9
        value: 1536x1024
      - key: IMAGE_SIZE_9_16
        value: 1024x1536
