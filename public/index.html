<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>原生广告封面生成 MVP</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #657488;
      --line: #dbe3ee;
      --blue: #2f6fed;
      --green: #16885f;
      --red: #c94646;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      padding: 24px 32px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .status {
      display: inline-flex;
      align-items: center;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff7e8;
      color: #8a5a00;
      font-size: 12px;
      font-weight: 700;
    }
    .status.ok {
      background: #eaf8f1;
      color: var(--green);
    }
    .status.bad {
      background: #fff0f0;
      color: var(--red);
    }
    .keybar {
      display: grid;
      grid-template-columns: minmax(260px, 520px) auto;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
      max-width: 720px;
    }
    .keybar input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font: inherit;
    }
    .keybar button {
      width: auto;
      margin-top: 0;
      padding: 9px 12px;
      background: #17202a;
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; color: var(--muted); }
    main {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
      padding: 24px 32px 40px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font: inherit;
    }
    textarea { min-height: 92px; resize: vertical; }
    input[type="file"] {
      padding: 9px;
      background: #fff;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px 14px;
      border: 0;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .action-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .action-row button {
      margin-top: 0;
      padding: 9px 8px;
      font-size: 12px;
      background: #eef3ff;
      color: var(--blue);
      border: 1px solid #c9d8ff;
    }
    .action-row button[data-action="selected"] {
      background: #eaf8f1;
      color: var(--green);
      border-color: #b8e1cf;
    }
    .action-row button[data-action="rejected"] {
      background: #fff0f0;
      color: var(--red);
      border-color: #f2c6c6;
    }
    .download-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }
    .download-row button,
    .download-row a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      margin-top: 0;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #c9d8ff;
      background: #eef3ff;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .note {
      margin-top: 8px;
      min-height: 42px;
      font-size: 13px;
    }
    .memory-note {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #f3f7ff;
      color: #29406f;
      font-size: 13px;
    }
    .task-list {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .task-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px;
      border-top: 1px solid var(--line);
      align-items: center;
    }
    .task-item:first-child { border-top: 0; }
    .task-item strong {
      display: block;
      margin-bottom: 3px;
      font-size: 13px;
    }
    .task-item span {
      color: var(--muted);
      font-size: 12px;
    }
    .task-actions {
      display: flex;
      gap: 6px;
    }
    .task-actions button,
    .secondary {
      width: auto;
      margin-top: 0;
      padding: 8px 10px;
      background: #eef3ff;
      color: var(--blue);
      border: 1px solid #c9d8ff;
      font-size: 12px;
    }
    .secondary {
      width: 100%;
      margin-top: 10px;
    }
    button:disabled { opacity: .6; cursor: wait; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .card {
      margin-bottom: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    pre {
      max-height: 340px;
      overflow: auto;
      padding: 12px;
      border-radius: 6px;
      background: #101827;
      color: #e5edf7;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .asset {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }
    .asset img {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .score {
      display: inline-flex;
      min-width: 56px;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      color: #fff;
      background: var(--green);
      font-weight: 700;
    }
    .score.bad { background: var(--red); }
    .empty {
      color: var(--muted);
      padding: 40px 0;
      text-align: center;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .asset { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>原生广告封面生成 MVP</h1>
    <p>输入自己的 OpenAI API Key，再填写应用名称和广告文案生成封面。</p>
    <div class="keybar">
      <input id="apiKeyInput" type="password" autocomplete="off" placeholder="输入你的 OpenAI API Key，仅保存在本机浏览器" />
      <button id="saveApiKey" type="button">保存 Key</button>
    </div>
    <div id="apiStatus" class="status">正在检查 API 模式...</div>
  </header>

  <main>
    <section>
      <form id="form">
        <label>导入广告表格 CSV</label>
        <input id="csvFile" type="file" accept=".csv,text/csv" />
        <p style="margin-top:8px;font-size:12px;"><a href="/sample_ads.csv" download>下载 4 条广告示例 CSV</a></p>
        <button class="secondary" id="batchGenerate" type="button" disabled>批量生成导入任务</button>
        <div id="taskList" class="task-list" hidden></div>

        <label>应用名称</label>
        <input name="appName" placeholder="例如：剪映" required />

        <label>广告文案</label>
        <textarea name="adCopy" placeholder="例如：3分钟做出爆款短视频，新手也能快速上手" required></textarea>

        <div class="grid">
          <div>
            <label>投放平台</label>
            <input name="platform" placeholder="TikTok / Meta / 抖音" />
          </div>
          <div>
            <label>行业/品类</label>
            <input name="industry" placeholder="视频剪辑工具" />
          </div>
        </div>

        <label>目标人群</label>
        <input name="targetAudience" placeholder="短视频创作者、新手博主" />

        <label>禁用词/禁用元素</label>
        <input name="forbiddenItems" value="二维码、下载按钮、水印、联系方式、夸张承诺" />

        <label>构图/生成备注</label>
        <textarea name="visualPreference" placeholder="例如：左右构图，右边放文字；或：居中构图，生活场景更自然"></textarea>

        <label>输出比例</label>
        <select name="aspectRatio">
          <option value="16:9">横版 16:9</option>
          <option value="9:16">竖版 9:16</option>
        </select>

        <label>生成数量</label>
        <select name="count">
          <option value="1">1 张，适合先测试成本</option>
          <option value="2">2 张</option>
          <option value="3">3 张</option>
          <option value="4">4 张</option>
        </select>

        <button id="submit" type="submit">生成封面</button>
      </form>
    </section>

    <section>
      <div id="result" class="empty">结果会显示在这里。</div>
    </section>
  </main>

  <script>
    const form = document.getElementById("form");
    const button = document.getElementById("submit");
    const result = document.getElementById("result");
    const csvFile = document.getElementById("csvFile");
    const taskList = document.getElementById("taskList");
    const batchGenerate = document.getElementById("batchGenerate");
    const apiStatus = document.getElementById("apiStatus");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const saveApiKey = document.getElementById("saveApiKey");
    let lastResult = null;
    let importedTasks = [];
    let allGeneratedResults = [];

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function jsonBlock(title, data) {
      return `<div class="card"><h2>${esc(title)}</h2><pre>${esc(JSON.stringify(data, null, 2))}</pre></div>`;
    }

    function fileSafeName(value) {
      return String(value || "cover")
        .replace(/[\\/:*?"<>|]+/g, "_")
        .replace(/\s+/g, "_")
        .slice(0, 80);
    }

    function assetFileName(result, asset, index) {
      const appName = fileSafeName(result?.input?.appName || "ad");
      const variant = fileSafeName(asset?.variantName || `asset_${index + 1}`);
      return `${appName}_${variant}_${asset?.assetId || index + 1}.png`;
    }

    function collectAssets(results = allGeneratedResults) {
      const items = [];
      for (const item of results || []) {
        if (item?.status === "failed") continue;
        for (const [index, asset] of (item.assets || []).entries()) {
          items.push({ result: item, asset, index });
        }
      }
      return items;
    }

    async function fetchAssetBlob(asset) {
      const rsp = await fetch(asset.imageUrl);
      if (!rsp.ok) throw new Error(`下载失败：${asset.imageUrl}`);
      return rsp.blob();
    }

    async function downloadAsset(resultIndex, assetIndex) {
      const resultItem = allGeneratedResults[resultIndex] || lastResult;
      const asset = resultItem?.assets?.[assetIndex];
      if (!asset) return;
      const blob = await fetchAssetBlob(asset);
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = assetFileName(resultItem, asset, assetIndex);
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function saveAllAssetsToFolder() {
      const items = collectAssets();
      if (!items.length) {
        alert("还没有可下载的图片。");
        return;
      }
      if (!window.showDirectoryPicker) {
        alert("当前浏览器不支持直接选择保存文件夹。我会改用浏览器默认下载方式逐张下载；如果想每次选择路径，请在浏览器下载设置里打开“下载前询问保存位置”。");
        for (const [i, item] of items.entries()) {
          await downloadAsset(allGeneratedResults.indexOf(item.result), item.index);
        }
        return;
      }
      const dir = await window.showDirectoryPicker();
      for (const item of items) {
        const blob = await fetchAssetBlob(item.asset);
        const handle = await dir.getFileHandle(assetFileName(item.result, item.asset, item.index), { create: true });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
      }
      alert(`已保存 ${items.length} 张图片到你选择的文件夹。`);
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      const clean = text.replace(/^\uFEFF/, "");
      for (let i = 0; i < clean.length; i += 1) {
        const ch = clean[i];
        const next = clean[i + 1];
        if (quoted && ch === '"' && next === '"') {
          cell += '"';
          i += 1;
        } else if (ch === '"') {
          quoted = !quoted;
        } else if (!quoted && ch === ",") {
          row.push(cell);
          cell = "";
        } else if (!quoted && (ch === "\n" || ch === "\r")) {
          if (ch === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some((value) => value.trim())) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }
      row.push(cell);
      if (row.some((value) => value.trim())) rows.push(row);
      if (rows.length < 2) return [];
      const headers = rows[0].map((value) => value.trim());
      return rows.slice(1).map((values) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = (values[index] || "").trim();
        });
        return item;
      }).filter((item) => item.appName && item.adCopy);
    }

    function loadTask(task) {
      for (const [key, value] of Object.entries(task)) {
        const field = form.elements[key];
        if (field) field.value = value;
      }
      if (!form.elements.count.value) form.elements.count.value = "1";
    }

    function renderTasks() {
      taskList.hidden = importedTasks.length === 0;
      batchGenerate.disabled = importedTasks.length === 0;
      taskList.innerHTML = importedTasks.map((task, index) => `
        <div class="task-item">
          <div>
            <strong>${esc(index + 1)}. ${esc(task.appName)}</strong>
            <span>${esc(task.adCopy)}${task.visualPreference ? " | " + esc(task.visualPreference) : ""}</span>
          </div>
          <div class="task-actions">
            <button type="button" data-load-task="${index}">载入</button>
            <button type="button" data-run-task="${index}">生成</button>
          </div>
        </div>
      `).join("");
    }

    function render(data) {
      lastResult = data;
      allGeneratedResults = [data];
      const assets = data.assets || [];
      result.className = "";
      result.innerHTML = `
        <div class="memory-note">已读取本地偏好记忆、历史失败记忆、平台行业记忆，并作为 Agent 2 输入。</div>
        ${jsonBlock("Agent 1：策略理解", data.strategy)}
        ${jsonBlock("Agent 2：封面生成", data.generation)}
        <div class="card">
          <h2>生成图片与质检</h2>
          ${assets.map((asset, index) => {
            const score = asset.quality?.totalScore ?? 0;
            return `
              <div class="asset" data-asset-index="${index}">
                <img src="${esc(asset.imageUrl)}" alt="${esc(asset.variantName)}">
                <div>
                  <p><strong>${esc(asset.variantName)}</strong> <span class="score ${score < 80 ? "bad" : ""}">${score}</span></p>
                  <div class="action-row">
                    <button type="button" data-feedback="${index}" data-action="selected">选中</button>
                    <button type="button" data-feedback="${index}" data-action="shortlisted">备选</button>
                    <button type="button" data-feedback="${index}" data-action="edited">已编辑</button>
                    <button type="button" data-feedback="${index}" data-action="rejected">拒绝</button>
                  </div>
                  <div class="download-row">
                    <button type="button" data-download-asset="0:${index}">下载图片</button>
                  </div>
                  <textarea class="note" data-note="${index}" placeholder="拒绝时请填写理由，例如：广告主名称太小、主体不明确、比例不对；选中/备选时可选填原因"></textarea>
                  <pre>${esc(JSON.stringify(asset.quality, null, 2))}</pre>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function getApiKey() {
      return apiKeyInput.value.trim();
    }

    function attachApiKey(payload) {
      return { ...payload, apiKey: getApiKey() };
    }

    async function recordFeedback(index, action) {
      if (!lastResult) return;
      const asset = lastResult.assets?.[index];
      if (!asset) return;
      const note = document.querySelector(`[data-note="${index}"]`)?.value || "";
      const clicked = document.querySelector(`[data-feedback="${index}"][data-action="${action}"]`);
      if (clicked) {
        clicked.disabled = true;
        clicked.textContent = "记录中";
      }
      try {
        if (action === "rejected" && !note.trim()) {
          throw new Error("拒绝前请先填写拒绝理由，系统会按这个理由重生成。");
        }
        const rsp = await fetch("/api/feedback", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            action,
            note,
            input: lastResult.input,
            asset,
            strictImageRules: lastResult.strictImageRules,
            apiKey: getApiKey(),
          }),
        });
        const data = await rsp.json();
        if (!rsp.ok) throw new Error(data.error || "记录失败");
        if (action === "rejected") {
          if (clicked) clicked.textContent = "重生成中";
          const regenRsp = await fetch("/api/regenerate", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              input: lastResult.input,
              strategy: lastResult.strategy,
              generation: lastResult.generation,
              asset,
              rejectionReason: note,
              strictImageRules: lastResult.strictImageRules,
              apiKey: getApiKey(),
            }),
          });
          const regenData = await regenRsp.json();
          if (!regenRsp.ok) throw new Error(regenData.error || "重生成失败");
          lastResult.assets = [...(lastResult.assets || []), regenData.asset];
          allGeneratedResults[0] = lastResult;
          render(lastResult);
          return;
        }
        if (clicked) clicked.textContent = "已记录";
      } catch (error) {
        if (clicked) {
          clicked.disabled = false;
          clicked.textContent = "重试";
        }
        alert(error.message);
      }
    }

    result.addEventListener("click", (event) => {
      const downloadTarget = event.target.closest("[data-download-asset]");
      if (downloadTarget) {
        const [resultIndex, assetIndex] = downloadTarget.dataset.downloadAsset.split(":").map(Number);
        downloadAsset(resultIndex, assetIndex).catch((error) => alert(error.message));
        return;
      }
      const downloadAllTarget = event.target.closest("[data-download-all]");
      if (downloadAllTarget) {
        saveAllAssetsToFolder().catch((error) => alert(error.message));
        return;
      }
      const target = event.target.closest("[data-feedback]");
      if (!target) return;
      recordFeedback(Number(target.dataset.feedback), target.dataset.action);
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      button.textContent = "生成中，可能需要 1-3 分钟...";
      result.className = "empty";
      result.textContent = "正在运行 Agent 1、Agent 2、图片生成和 Agent 3 质检。";

      const payload = Object.fromEntries(new FormData(form).entries());
      payload.count = Number(payload.count || 1);

      try {
        const rsp = await fetch("/api/generate", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(attachApiKey(payload)),
        });
        const data = await rsp.json();
        if (!rsp.ok) throw new Error(data.error || "生成失败");
        render(data);
      } catch (error) {
        result.className = "empty";
        result.textContent = error.message;
      } finally {
        button.disabled = false;
        button.textContent = "生成封面";
      }
    });

    async function refreshApiStatus() {
      try {
        const rsp = await fetch("/api/config");
        const data = await rsp.json();
        const hasUserKey = !!getApiKey();
        apiStatus.className = `status ${hasUserKey || data.hasServerApiKey ? "ok" : "bad"}`;
        apiStatus.textContent = hasUserKey
          ? `已填写用户 Key：${data.textModel} / ${data.imageModel}`
          : data.hasServerApiKey
            ? `服务器已配置备用 Key：${data.textModel} / ${data.imageModel}`
            : "请先填写你自己的 OpenAI API Key";
      } catch {
        apiStatus.className = "status bad";
        apiStatus.textContent = "API 状态读取失败：请重启服务";
      }
    }

    async function generatePayload(payload) {
      const rsp = await fetch("/api/generate", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(attachApiKey(payload)),
      });
      const data = await rsp.json();
      if (!rsp.ok) throw new Error(data.error || "生成失败");
      return data;
    }

    csvFile.addEventListener("change", async () => {
      const file = csvFile.files?.[0];
      if (!file) return;
      importedTasks = parseCsv(await file.text());
      renderTasks();
      if (importedTasks[0]) loadTask(importedTasks[0]);
    });

    saveApiKey.addEventListener("click", () => {
      localStorage.setItem("nativeAdCoverApiKey", getApiKey());
      refreshApiStatus();
    });

    apiKeyInput.addEventListener("input", refreshApiStatus);

    apiKeyInput.value = localStorage.getItem("nativeAdCoverApiKey") || "";

    taskList.addEventListener("click", async (event) => {
      const loadButton = event.target.closest("[data-load-task]");
      const runButton = event.target.closest("[data-run-task]");
      if (loadButton) {
        loadTask(importedTasks[Number(loadButton.dataset.loadTask)]);
      }
      if (runButton) {
        const task = importedTasks[Number(runButton.dataset.runTask)];
        loadTask(task);
        button.disabled = true;
        runButton.disabled = true;
        result.className = "empty";
        result.textContent = `正在生成：${task.appName}`;
        try {
          render(await generatePayload({ ...task, count: Number(task.count || 1) }));
        } catch (error) {
          result.textContent = error.message;
        } finally {
          button.disabled = false;
          runButton.disabled = false;
        }
      }
    });

    batchGenerate.addEventListener("click", async () => {
      button.disabled = true;
      batchGenerate.disabled = true;
      const batchResults = [];
      allGeneratedResults = batchResults;
      const renderBatch = (currentText = "") => {
        result.className = "";
        result.innerHTML = `
          <div class="memory-note">
            ${esc(currentText || `批量任务：已完成 ${batchResults.filter((item) => item.status !== "failed").length} 条，失败 ${batchResults.filter((item) => item.status === "failed").length} 条。`)}
            <div class="download-row" style="margin-top:10px;">
              <button type="button" data-download-all="1">选择文件夹保存全部图片</button>
            </div>
          </div>
          ${batchResults.map((item, resultIndex) => item.status === "failed" ? `
            <div class="card">
              <h2>${esc(resultIndex + 1)}. ${esc(item.input?.appName || "生成失败")}</h2>
              <p style="color: var(--red);">${esc(item.error)}</p>
            </div>
          ` : `
          <div class="card">
            <h2>${esc(resultIndex + 1)}. ${esc(item.input.appName)}</h2>
            ${(item.assets || []).map((asset, assetIndex) => `
              <div class="asset">
                <img src="${esc(asset.imageUrl)}" alt="${esc(asset.variantName)}">
                <div>
                  <p><strong>${esc(asset.variantName)}</strong> <span class="score ${(asset.quality?.totalScore ?? 0) < 80 ? "bad" : ""}">${esc(asset.quality?.totalScore ?? 0)}</span></p>
                  <div class="download-row">
                    <button type="button" data-download-asset="${resultIndex}:${assetIndex}">下载图片</button>
                  </div>
                  <pre>${esc(JSON.stringify(asset.quality, null, 2))}</pre>
                </div>
              </div>
            `).join("")}
          </div>
        `).join("")}
        `;
      };
      try {
        for (let i = 0; i < importedTasks.length; i += 1) {
          const task = importedTasks[i];
          renderBatch(`正在批量生成 ${i + 1}/${importedTasks.length}：${task.appName}`);
          try {
            batchResults.push(await generatePayload({ ...task, count: Number(task.count || 1) }));
          } catch (error) {
            batchResults.push({
              status: "failed",
              input: task,
              error: error.message,
            });
          }
          renderBatch();
        }
      } finally {
        button.disabled = false;
        batchGenerate.disabled = importedTasks.length === 0;
      }
    });

    refreshApiStatus();
  </script>
</body>
</html>
